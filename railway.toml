[build]
builder = "NIXPACKS"
# Put npm cache outside node_modules — Nixpacks cache mounts make
# rmdir('/app/node_modules/.cache') fail with EBUSY during npm ci.
buildCommand = "npm ci --cache /tmp/npm-cache && npm run build --workspace=@league-arena/web"

[deploy]
startCommand = "npm run start --workspace=@league-arena/api"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
